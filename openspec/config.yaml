schema: spec-driven

context: |
  Tmux session manager ("tses") — a single Bash script.
  Tech: Bash, tmux, fzf, coreutils (find, sed, awk).
  Scans ~/git for git repos (up to 3 levels deep) and lets the user
  open a tmux session rooted in a repo or kill an existing session.
  Two subcommands: `open [name]` and `kill [name]`.
  Optional name arg for direct access; without it, fzf picker is shown.

rules:
  proposal:
    - Keep proposals short; this is a small single-file CLI tool
  tasks:
    - Each task should be a single, testable shell change
